<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250">
  <!-- LEFT: Organized sorted piles -->
  <text x="125" y="20" text-anchor="middle" fill="#e3a463" font-family="Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="0.08em">SORTED</text>

  <!-- Pile 1: Large stones -->
  <ellipse cx="40" cy="200" rx="30" ry="12" fill="#455666" stroke="#537c9b" stroke-width="1"/>
  <ellipse cx="35" cy="190" rx="14" ry="10" fill="#537c9b" opacity="0.7"/>
  <ellipse cx="50" cy="188" rx="12" ry="9" fill="#537c9b" opacity="0.6"/>
  <text x="40" y="225" text-anchor="middle" fill="#b3c3d3" font-family="Inter, sans-serif" font-size="9">Large</text>

  <!-- Pile 2: Medium stones -->
  <ellipse cx="100" cy="202" rx="25" ry="10" fill="#455666" stroke="#537c9b" stroke-width="1"/>
  <circle cx="93" cy="194" r="7" fill="#537c9b" opacity="0.7"/>
  <circle cx="107" cy="193" r="6" fill="#537c9b" opacity="0.6"/>
  <circle cx="100" cy="186" r="5" fill="#537c9b" opacity="0.5"/>
  <text x="100" y="225" text-anchor="middle" fill="#b3c3d3" font-family="Inter, sans-serif" font-size="9">Medium</text>

  <!-- Pile 3: Small stones -->
  <ellipse cx="160" cy="204" rx="22" ry="8" fill="#455666" stroke="#537c9b" stroke-width="1"/>
  <circle cx="153" cy="198" r="4" fill="#537c9b" opacity="0.7"/>
  <circle cx="163" cy="197" r="3.5" fill="#537c9b" opacity="0.6"/>
  <circle cx="158" cy="192" r="3" fill="#537c9b" opacity="0.5"/>
  <circle cx="167" cy="193" r="3.5" fill="#537c9b" opacity="0.5"/>
  <text x="160" y="225" text-anchor="middle" fill="#b3c3d3" font-family="Inter, sans-serif" font-size="9">Small</text>

  <!-- Pile 4: Tiny stones -->
  <ellipse cx="215" cy="206" rx="18" ry="6" fill="#455666" stroke="#537c9b" stroke-width="1"/>
  <circle cx="208" cy="201" r="2.5" fill="#537c9b" opacity="0.7"/>
  <circle cx="215" cy="200" r="2" fill="#537c9b" opacity="0.6"/>
  <circle cx="222" cy="201" r="2.5" fill="#537c9b" opacity="0.5"/>
  <circle cx="215" cy="196" r="2" fill="#537c9b" opacity="0.5"/>
  <text x="215" y="225" text-anchor="middle" fill="#b3c3d3" font-family="Inter, sans-serif" font-size="9">Tiny</text>

  <!-- Checkmark -->
  <circle cx="125" cy="55" r="18" fill="none" stroke="#e3a463" stroke-width="2"/>
  <polyline points="115,55 122,63 137,48" fill="none" stroke="#e3a463" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="125" y="90" text-anchor="middle" fill="#e5bc9c" font-family="Inter, sans-serif" font-size="11">Ready for the builder</text>

  <!-- Divider -->
  <line x1="250" y1="30" x2="250" y2="230" stroke="#455666" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- RIGHT: Messy heap -->
  <text x="375" y="20" text-anchor="middle" fill="#7a95a8" font-family="Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="0.08em">UNSORTED</text>

  <!-- Messy pile of mixed stones -->
  <ellipse cx="375" cy="200" rx="70" ry="20" fill="#455666" stroke="#537c9b" stroke-width="1" opacity="0.6"/>
  <ellipse cx="355" cy="185" rx="16" ry="12" fill="#537c9b" opacity="0.4" transform="rotate(-15 355 185)"/>
  <circle cx="385" cy="180" r="9" fill="#537c9b" opacity="0.35"/>
  <ellipse cx="365" cy="175" rx="8" ry="6" fill="#537c9b" opacity="0.45" transform="rotate(25 365 175)"/>
  <circle cx="395" cy="188" r="5" fill="#537c9b" opacity="0.3"/>
  <circle cx="345" cy="190" r="4" fill="#537c9b" opacity="0.4"/>
  <ellipse cx="380" cy="170" rx="11" ry="8" fill="#537c9b" opacity="0.35" transform="rotate(-10 380 170)"/>
  <circle cx="360" cy="168" r="6" fill="#537c9b" opacity="0.3"/>
  <circle cx="390" cy="175" r="3" fill="#537c9b" opacity="0.35"/>
  <circle cx="370" cy="163" r="4" fill="#537c9b" opacity="0.3"/>

  <!-- X mark -->
  <circle cx="375" cy="55" r="18" fill="none" stroke="#7a95a8" stroke-width="2"/>
  <line x1="365" y1="45" x2="385" y2="65" stroke="#7a95a8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="385" y1="45" x2="365" y2="65" stroke="#7a95a8" stroke-width="2.5" stroke-linecap="round"/>
  <text x="375" y="90" text-anchor="middle" fill="#7a95a8" font-family="Inter, sans-serif" font-size="11">Too late when needed</text>
</svg>
