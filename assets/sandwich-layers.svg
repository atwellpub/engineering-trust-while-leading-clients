<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Top bread — Opening PDF -->
  <rect x="60" y="30" width="280" height="60" rx="30" fill="#e3a463" opacity="0.9"/>
  <text x="200" y="57" text-anchor="middle" fill="#1d3548" font-family="Inter, sans-serif" font-size="13" font-weight="600">OPENING PDF</text>
  <text x="200" y="75" text-anchor="middle" fill="#1d3548" font-family="Inter, sans-serif" font-size="10" opacity="0.7">Sets expectations &amp; builds trust</text>

  <!-- Filling — Work Execution -->
  <rect x="80" y="110" width="240" height="80" rx="8" fill="#455666" stroke="#537c9b" stroke-width="1"/>
  <!-- Filling layers -->
  <rect x="95" y="122" width="210" height="8" rx="4" fill="#537c9b" opacity="0.6"/>
  <rect x="95" y="138" width="180" height="8" rx="4" fill="#537c9b" opacity="0.4"/>
  <rect x="95" y="154" width="195" height="8" rx="4" fill="#537c9b" opacity="0.5"/>
  <rect x="95" y="170" width="160" height="8" rx="4" fill="#537c9b" opacity="0.3"/>
  <text x="200" y="200" text-anchor="middle" fill="#f5f0eb" font-family="Inter, sans-serif" font-size="13" font-weight="600" opacity="0">WORK EXECUTION</text>
  <!-- Centered label on top of filling -->
  <text x="200" y="150" text-anchor="middle" fill="#f5f0eb" font-family="Inter, sans-serif" font-size="13" font-weight="600" opacity="0.9">WORK EXECUTION</text>

  <!-- Bottom bread — Closing PDF -->
  <rect x="60" y="210" width="280" height="60" rx="30" fill="#e5bc9c" opacity="0.9"/>
  <text x="200" y="237" text-anchor="middle" fill="#1d3548" font-family="Inter, sans-serif" font-size="13" font-weight="600">CLOSING PDF</text>
  <text x="200" y="255" text-anchor="middle" fill="#1d3548" font-family="Inter, sans-serif" font-size="10" opacity="0.7">Reinforces value &amp; opens opportunities</text>

  <!-- Side arrows -->
  <line x1="38" y1="60" x2="38" y2="240" stroke="#e3a463" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>
  <polygon points="34,60 42,60 38,50" fill="#e3a463" opacity="0.4"/>
  <polygon points="34,240 42,240 38,250" fill="#e3a463" opacity="0.4"/>
</svg>
