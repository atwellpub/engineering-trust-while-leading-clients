<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Light rays coming through doorway -->
  <defs>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e3a463" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e3a463" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Light rays -->
  <polygon points="200,40 340,0 380,80" fill="#e3a463" opacity="0.06"/>
  <polygon points="200,80 360,30 390,130" fill="#e3a463" opacity="0.08"/>
  <polygon points="200,120 370,80 390,180" fill="#e3a463" opacity="0.1"/>
  <polygon points="200,160 360,140 380,230" fill="#e3a463" opacity="0.08"/>
  <polygon points="200,200 340,200 370,270" fill="#e3a463" opacity="0.06"/>

  <!-- Warm glow through opening -->
  <rect x="195" y="30" width="12" height="230" fill="#e3a463" opacity="0.15" rx="2"/>

  <!-- Wall -->
  <rect x="20" y="20" width="175" height="260" fill="#27445c" rx="0"/>

  <!-- Door frame -->
  <rect x="145" y="30" width="60" height="240" fill="none" stroke="#455666" stroke-width="3"/>

  <!-- Door (opening outward to the right) -->
  <path d="M 205,30 L 205,270 L 250,260 L 250,40 Z" fill="#455666" stroke="#537c9b" stroke-width="1.5"/>

  <!-- Door handle -->
  <circle cx="215" cy="155" r="4" fill="#e3a463"/>

  <!-- Door panel details -->
  <rect x="215" y="55" width="25" height="70" rx="3" fill="none" stroke="#537c9b" stroke-width="1" opacity="0.4"/>
  <rect x="215" y="145" width="25" height="70" rx="3" fill="none" stroke="#537c9b" stroke-width="1" opacity="0.4"/>

  <!-- Light streak on floor -->
  <polygon points="175,270 205,270 320,290 200,290" fill="#e3a463" opacity="0.08"/>

  <!-- Text -->
  <text x="80" y="290" text-anchor="middle" fill="#7a95a8" font-family="Inter, sans-serif" font-size="11" font-weight="500">CLOSED</text>
  <text x="310" y="290" text-anchor="middle" fill="#e3a463" font-family="Inter, sans-serif" font-size="11" font-weight="600">OPPORTUNITY</text>
</svg>
