<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320">
  <!-- Equilateral triangle -->
  <polygon points="200,60 50,270 350,270" fill="none" stroke="#e3a463" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Connecting lines (subtle) -->
  <line x1="200" y1="60" x2="50" y2="270" stroke="#455666" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="200" y1="60" x2="350" y2="270" stroke="#455666" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="50" y1="270" x2="350" y2="270" stroke="#455666" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Vertex circles -->
  <circle cx="200" cy="60" r="8" fill="#27445c" stroke="#e3a463" stroke-width="2"/>
  <circle cx="50" cy="270" r="8" fill="#27445c" stroke="#e3a463" stroke-width="2"/>
  <circle cx="350" cy="270" r="8" fill="#27445c" stroke="#e3a463" stroke-width="2"/>

  <!-- Labels -->
  <text x="200" y="25" text-anchor="middle" fill="#e5bc9c" font-family="Inter, sans-serif" font-size="11">Credibility</text>
  <text x="200" y="44" text-anchor="middle" fill="#f5f0eb" font-family="Inter, sans-serif" font-size="18" font-weight="700">Ethos</text>

  <text x="30" y="295" text-anchor="middle" fill="#f5f0eb" font-family="Inter, sans-serif" font-size="18" font-weight="700">Pathos</text>
  <text x="30" y="311" text-anchor="middle" fill="#e5bc9c" font-family="Inter, sans-serif" font-size="11">Emotion</text>

  <text x="370" y="295" text-anchor="middle" fill="#f5f0eb" font-family="Inter, sans-serif" font-size="18" font-weight="700">Logos</text>
  <text x="370" y="311" text-anchor="middle" fill="#e5bc9c" font-family="Inter, sans-serif" font-size="11">Logic</text>

  <!-- Center label -->
  <text x="200" y="185" text-anchor="middle" fill="#e3a463" font-family="Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em">SALES PERSUASION</text>
</svg>
